<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KiamaConnect – Session Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #7c3aed;
      --accent2: #4f46e5;
      --green: #10b981;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Background glow ── */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,58,237,.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 480px;
      position: relative;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 32px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
      border: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--muted);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all .2s;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }

    /* ── Input ── */
    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
    }

    .input-group input:focus { border-color: var(--accent); }
    .input-group input::placeholder { color: var(--muted); }

    /* ── Button ── */
    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }

    .btn:hover { opacity: .9; }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── Status / QR area ── */
    #output { margin-top: 24px; }

    .status-box {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .status-box.info  { background: rgba(79,70,229,.12); border: 1px solid rgba(79,70,229,.3); color: #a5b4fc; }
    .status-box.success { background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.3); color: #6ee7b7; }
    .status-box.error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(165,180,252,.3);
      border-top-color: #a5b4fc;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── QR ── */
    #qr-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 20px;
      background: #fff;
      border-radius: var(--radius);
    }

    #qr-wrap img { width: 220px; height: 220px; display: block; }

    #qr-wrap p {
      font-size: 12px;
      color: #64748b;
      text-align: center;
    }

    /* ── Pairing code ── */
    #pairing-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    #pairing-code {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 6px;
      background: linear-gradient(135deg, #a78bfa, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #pairing-wrap p {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    /* ── Session ID result ── */
    #session-wrap {
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    #session-wrap .label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #session-id-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      color: #a5b4fc;
      word-break: break-all;
      max-height: 120px;
      overflow-y: auto;
    }

    .copy-btn {
      padding: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .copy-btn:hover { border-color: var(--accent); color: #a5b4fc; }
    .copy-btn.copied { border-color: var(--green); color: #6ee7b7; }

    .footer {
      margin-top: 28px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <h1>KiamaConnect</h1>
  </div>
  <p class="subtitle">Generate your WhatsApp bot session ID</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('qr', this)">📷 QR Code</button>
    <button class="tab" onclick="switchTab('pair', this)">📱 Pairing Code</button>
  </div>

  <!-- QR tab -->
  <div id="tab-qr">
    <p style="font-size:13px; color:var(--muted); margin-bottom:20px;">
      Scan the QR code with WhatsApp → <strong style="color:var(--text)">Linked Devices → Link a Device</strong>
    </p>
    <button class="btn" id="btn-qr" onclick="startQR()">Generate QR Code</button>
  </div>

  <!-- Pairing tab -->
  <div id="tab-pair" style="display:none;">
    <div class="input-group">
      <label>Phone Number (with country code)</label>
      <input type="tel" id="phone" placeholder="e.g. 254712345678" />
    </div>
    <button class="btn" id="btn-pair" onclick="startPairing()">Get Pairing Code</button>
  </div>

  <div id="output"></div>

  <div class="footer">Keep your session ID private — it's your WhatsApp login</div>
</div>

<script>
  let currentTab = 'qr';
  let eventSource = null;

  function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-qr').style.display = tab === 'qr' ? 'block' : 'none';
    document.getElementById('tab-pair').style.display = tab === 'pair' ? 'block' : 'none';
    clearOutput();
    if (eventSource) { eventSource.close(); eventSource = null; }
  }

  function clearOutput() {
    document.getElementById('output').innerHTML = '';
  }

  function showStatus(type, icon, message, loading) {
    clearOutput();
    const o = document.getElementById('output');
    o.innerHTML = `
      <div class="status-box ${type}">
        ${loading ? '<div class="spinner"></div>' : `<span>${icon}</span>`}
        <span>${message}</span>
      </div>`;
  }

  function startQR() {
    if (eventSource) eventSource.close();
    document.getElementById('btn-qr').disabled = true;
    showStatus('info', '', 'Connecting to WhatsApp...', true);
    connect('');
  }

  function startPairing() {
    const phone = document.getElementById('phone').value.replace(/[^0-9]/g, '');
    if (phone.length < 7) {
      showStatus('error', '❌', 'Please enter a valid phone number');
      return;
    }
    if (eventSource) eventSource.close();
    document.getElementById('btn-pair').disabled = true;
    showStatus('info', '', 'Requesting pairing code...', true);
    connect(phone);
  }

  function connect(phone) {
    const url = '/api/connect' + (phone ? `?phone=${phone}` : '');
    eventSource = new EventSource(url);

    eventSource.addEventListener('qr', e => {
      const { image } = JSON.parse(e.data);
      const o = document.getElementById('output');
      o.innerHTML = `
        <div id="qr-wrap" style="display:flex; flex-direction:column; align-items:center; gap:12px; padding:20px; background:#fff; border-radius:14px;">
          <img src="${image}" alt="QR Code" />
          <p style="font-size:12px; color:#64748b; text-align:center;">Open WhatsApp → Linked Devices → Link a Device → Scan this code</p>
        </div>
        <div class="status-box info" style="margin-top:12px;">
          <div class="spinner"></div>
          <span>Waiting for scan...</span>
        </div>`;
    });

    eventSource.addEventListener('pairing_code', e => {
      const { code } = JSON.parse(e.data);
      const o = document.getElementById('output');
      o.innerHTML = `
        <div id="pairing-wrap" style="display:flex; flex-direction:column; align-items:center; gap:8px;">
          <p style="font-size:13px; color:var(--muted);">Enter this code in WhatsApp → Linked Devices → Link with phone number</p>
          <div id="pairing-code">${code}</div>
          <p style="font-size:12px; color:var(--muted);">Code expires in 60 seconds</p>
        </div>
        <div class="status-box info" style="margin-top:16px;">
          <div class="spinner"></div>
          <span>Waiting for confirmation...</span>
        </div>`;
    });

    eventSource.addEventListener('status', e => {
      const { message } = JSON.parse(e.data);
      const existing = document.getElementById('output');
      const statusBox = existing.querySelector('.status-box');
      if (statusBox) statusBox.innerHTML = `<div class="spinner"></div><span>${message}</span>`;
    });

    eventSource.addEventListener('session', e => {
      const { id } = JSON.parse(e.data);
      if (eventSource) { eventSource.close(); eventSource = null; }

      document.getElementById('output').innerHTML = `
        <div class="status-box success">
          <span>✅</span>
          <span>Session ID generated successfully!</span>
        </div>
        <div id="session-wrap" style="display:flex; flex-direction:column; gap:10px;">
          <div class="label">Your Session ID</div>
          <div id="session-id-box">${id}</div>
          <button class="copy-btn" id="copy-btn" onclick="copySession('${id.replace(/'/g, "\\'")}')">
            📋 Copy Session ID
          </button>
          <div style="font-size:12px; color:var(--muted); padding: 10px; background: rgba(124,58,237,.08); border-radius:8px; border:1px solid rgba(124,58,237,.2);">
            Paste into your bot's <code style="color:#a5b4fc;">.env</code> file as:<br/>
            <code style="color:#6ee7b7;">SESSION_ID=KiamaConnect~...</code>
          </div>
        </div>`;

      document.getElementById('btn-qr') && (document.getElementById('btn-qr').disabled = false);
      document.getElementById('btn-pair') && (document.getElementById('btn-pair').disabled = false);
    });

    eventSource.addEventListener('error', e => {
      try {
        const { message } = JSON.parse(e.data);
        showStatus('error', '❌', message);
      } catch (_) {
        showStatus('error', '❌', 'Connection failed. Please try again.');
      }
      if (eventSource) { eventSource.close(); eventSource = null; }
      document.getElementById('btn-qr') && (document.getElementById('btn-qr').disabled = false);
      document.getElementById('btn-pair') && (document.getElementById('btn-pair').disabled = false);
    });

    eventSource.onerror = () => {
      if (eventSource?.readyState === EventSource.CLOSED) {
        // Already handled
      }
    };
  }

  function copySession(id) {
    navigator.clipboard.writeText(id).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.classList.add('copied');
      btn.innerHTML = '✅ Copied!';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = '📋 Copy Session ID';
      }, 2500);
    });
  }
</script>

</body>
</html>
